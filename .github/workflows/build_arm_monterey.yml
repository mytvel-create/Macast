name: Build Macast ARM Monterey

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    env:
      MACOSX_DEPLOYMENT_TARGET: "12.5"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install System Dependencies
        run: |
          brew install gettext
          echo "/opt/homebrew/opt/gettext/bin" >> $GITHUB_PATH

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # 明确安装打包工具
          pip install py2app
          # 安装项目依赖
          pip install .

      - name: Generate Translation Files
        run: |
          # 精准定位并生成 .mo 文件
          I18N_DIR=$(find . -name i18n -type d | head -n 1)
          if [ -z "$I18N_DIR" ]; then
            echo "I18N directory not found, checking subdirectories..."
            I18N_DIR="./macast/i18n"
          fi
          
          if [ -d "$I18N_DIR" ]; then
            echo "Processing translations in $I18N_DIR"
            find "$I18N_DIR" -name "*.po" -exec msgfmt {} -o {}.mo \;
            # 确保生成的二进制文件命名符合程序调用预期
            find "$I18N_DIR" -name "*.po.mo" -exec sh -c 'mv "$1" "${1%.po.mo}.mo"' _ {} \;
          fi

      - name: Build Application
        run: |
          # 使用最标准的 py2app 调用方式
          # 不加 --alias 参数默认就是自包含（Standalone）模式
          python setup.py py2app

      - name: Create DMG
        run: |
          # 检查生成结果并打包
          if [ -d "dist/Macast.app" ]; then
            hdiutil create -volname "Macast-ARM" -srcfolder dist/Macast.app -ov -format UDZO Macast-ARM-Monterey.dmg
          else
            echo "Error: Macast.app not found in dist/"
            ls -R dist/
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Macast-ARM-Monterey-DMG
          path: Macast-ARM-Monterey.dmg
