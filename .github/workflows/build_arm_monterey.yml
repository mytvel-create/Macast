name: Build Macast ARM Monterey

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    env:
      MACOSX_DEPLOYMENT_TARGET: "12.5"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install System Dependencies
        run: |
          # 仅安装必须的 gettext 用于处理翻译
          brew install gettext
          echo "/opt/homebrew/opt/gettext/bin" >> $GITHUB_PATH

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # 先安装 py2app
          pip install py2app
          # 再安装项目及其依赖
          pip install .

      - name: Generate Translation Files
        run: |
          # 自动定位 i18n 目录并生成编译后的 .mo 文件
          I18N_DIR=$(find . -name i18n -type d | head -n 1)
          if [ -n "$I18N_DIR" ]; then
            echo "Found i18n directory at: $I18N_DIR"
            # 尝试运行脚本，如果失败则手动编译
            (cd "$I18N_DIR" && sh build.sh) || \
            find "$I18N_DIR" -name "*.po" -exec msgfmt {} -o {}.mo \;
            # 确保文件名正确
            find "$I18N_DIR" -name "*.po.mo" -exec sh -c 'mv "$1" "${1%.po.mo}.mo"' _ {} \;
          else
            echo "Warning: i18n directory not found."
          fi

      - name: Build Application
        run: |
          # 使用 py2app 打包，--no-alias 确保自包含
          python setup.py py2app --no-alias

      - name: Create DMG (Native Method)
        run: |
          # 使用 macOS 原生 hdiutil 打包 dmg
          # 这里的 -srcfolder 指向 py2app 生成的 dist 目录
          hdiutil create -volname "Macast-ARM" -srcfolder dist/Macast.app -ov -format UDZO Macast-ARM-Monterey.dmg

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Macast-ARM-Monterey-DMG
          path: Macast-ARM-Monterey.dmg
