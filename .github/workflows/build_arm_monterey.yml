name: Build Macast ARM Monterey (PyInstaller)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    env:
      MACOSX_DEPLOYMENT_TARGET: "12.5"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # 直接安装项目及其依赖，忽略 setup.py 的元数据限制
          pip install .
          # 安装 PyInstaller，比 py2app 更适合这种复杂项目
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          # 假设 Macast 的入口文件是 macast/__main__.py 或 main.py
          # 如果不确定，通常是 macast.app 的启动脚本
          # 我们先尝试寻找入口文件
          ENTRY_POINT=$(find . -name "main.py" -o -name "__main__.py" | head -n 1)
          echo "Found entry point: $ENTRY_POINT"
          
          # 使用 PyInstaller 打包
          # -w 表示窗口模式（不弹黑窗口）
          # --onefile 打包成单个可执行文件
          pyinstaller --noconfirm --windowed --name "Macast" "$ENTRY_POINT"

      - name: Package to DMG
        run: |
          # PyInstaller 生成的目录在 dist/Macast/
          hdiutil create -volname "Macast-ARM" -srcfolder dist/Macast -ov -format UDZO Macast-ARM-Monterey.dmg

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Macast-ARM-Monterey-DMG
          path: Macast-ARM-Monterey.dmg
