name: Build Macast ARM Monterey (PyInstaller Final)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    env:
      MACOSX_DEPLOYMENT_TARGET: "12.5"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: python-setup@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # 必须安装这些才能启动 Macast
          pip install .
          pip install pyinstaller PyQt5 qasync

      - name: Build with PyInstaller
        run: |
          # 既然 find 没找到，我们直接指定项目根目录下的 run.py
          # 同时添加 --collect-all 来确保 PyQt5 等复杂库能被正确打包
          pyinstaller --noconfirm --windowed --name "Macast" \
            --collect-all PyQt5 \
            --collect-all qasync \
            run.py

      - name: Create DMG
        run: |
          # PyInstaller 生成目录通常是 dist/Macast
          hdiutil create -volname "Macast-ARM" -srcfolder dist/Macast -ov -format UDZO Macast-ARM-Monterey.dmg

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Macast-ARM-Monterey-DMG
          path: Macast-ARM-Monterey.dmg
