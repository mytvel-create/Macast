name: Build Macast ARM Monterey

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    env:
      MACOSX_DEPLOYMENT_TARGET: "12.5"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install System Dependencies
        run: |
          brew install gettext
          echo "/opt/homebrew/opt/gettext/bin" >> $GITHUB_PATH

      - name: Fix Environment & Dependencies
        run: |
          python -m pip install --upgrade pip
          # 关键点：强制降级 setuptools 以兼容旧版 setup.py 写法
          pip install "setuptools<60.0.0"
          pip install py2app
          # 安装项目自身
          pip install .

      - name: Build Application
        run: |
          # 显式清理之前的构建产物，防止环境污染
          rm -rf build dist
          python setup.py py2app

      - name: Create DMG
        run: |
          # 确保路径存在并打包
          if [ -d "dist/Macast.app" ]; then
            hdiutil create -volname "Macast-ARM" -srcfolder dist/Macast.app -ov -format UDZO Macast-ARM-Monterey.dmg
          else
            echo "Build failed: Macast.app not found."
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Macast-ARM-Monterey-DMG
          path: Macast-ARM-Monterey.dmg
