name: Build Macast ARM for Monterey

on:
  workflow_dispatch: # 支持手动点击运行

jobs:
  build:
    # 关键：使用 macos-14 (M1 运行器)
    runs-on: macos-14
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9' # 建议使用 3.9 或 3.10 以增强对旧版 macOS 的兼容性

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install py2app  # Macast 通常使用 py2app 打包 macOS 版本

      - name: Build App
        run: |
          # 调用项目自带的 Makefile 进行构建，确保逻辑与原版一致
          # 如果 Makefile 中有专门的 macos 目标，请使用该目标
          make macos
          
          # 注意：如果 make 命令执行失败，可以尝试直接运行作者提供的打包脚本：
          # python setup.py py2app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Macast-ARM-Monterey
          path: dist/*.dmg
